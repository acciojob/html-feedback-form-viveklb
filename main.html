<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form action="/submit" method="post">

  <label>Name:</label>
  <input 
    type="Text" 
    id="name" 
    minlength="3" 
    maxlength="50" >
  <br><br>
		
  <label>Portfolio:</label>
  <input 
    type="URL" 
    id="portfolio" 
    name="portfolio" >

  <label>Favorite Color:</label>
  <input 
    type="Color" 
    id="favColor" 
  <br><br>

  <label>Likeness:</label>
  <input 
    type="range" 
    id="likeness" 
    min="1" 
    max="100"
	  >
</form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
